<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>像素机甲对战 - 终极版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a15;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #fff;
            padding: 10px;
        }
        h1 {
            color: #ffd700;
            text-shadow: 3px 3px 0px #ff6b6b, -1px -1px 0 #4ecdc4;
            margin-bottom: 15px;
            font-size: 2rem;
            letter-spacing: 4px;
            text-align: center;
        }
        .screen { display: none; }
        .screen.active { display: flex; flex-direction: column; align-items: center; }
        #gameContainer { position: relative; border: 4px solid #333; box-shadow: 0 0 30px rgba(255, 215, 0, 0.3); }
        #gameCanvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
        .selection-container { width: 900px; max-width: 95vw; }
        .selection-title { color: #ffd700; font-size: 1.8rem; margin-bottom: 20px; text-align: center; }
        .selection-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 20px; }
        .character-card {
            background: #1a1a2e;
            border: 3px solid #333;
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        .character-card:hover { border-color: #ffd700; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(255, 215, 0, 0.2); }
        .character-card.selected { border-color: #00ff00; background: #0a2a0a; box-shadow: 0 0 20px rgba(0, 255, 0, 0.4); }
        .character-card.selected-p2 { border-color: #ff00ff; background: #2a0a2a; box-shadow: 0 0 20px rgba(255, 0, 255, 0.4); }
        .character-icon { width: 60px; height: 60px; margin: 0 auto 10px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .character-name { font-size: 0.9rem; font-weight: bold; margin-bottom: 5px; }
        .character-desc { font-size: 0.7rem; color: #aaa; line-height: 1.3; }
        .character-stats { margin-top: 8px; font-size: 0.65rem; }
        .stat-bar { display: flex; align-items: center; margin: 2px 0; }
        .stat-label { width: 35px; text-align: left; }
        .stat-fill { flex: 1; height: 6px; background: #333; border-radius: 3px; overflow: hidden; }
        .stat-fill-inner { height: 100%; border-radius: 3px; }
        .selection-info { display: flex; justify-content: space-around; width: 100%; margin-bottom: 20px; }
        .player-selection { text-align: center; padding: 15px 30px; border-radius: 10px; min-width: 200px; }
        .player-selection.p1 { background: rgba(0, 255, 0, 0.1); border: 2px solid #00ff00; }
        .player-selection.p2 { background: rgba(255, 0, 255, 0.1); border: 2px solid #ff00ff; }
        .player-selection h3 { margin-bottom: 10px; }
        .selected-character-name { color: #ffd700; font-size: 1.2rem; }
        .scene-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
        .scene-card {
            background: #1a1a2e;
            border: 3px solid #333;
            border-radius: 10px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        .scene-card:hover { border-color: #ffd700; transform: scale(1.05); }
        .scene-card.selected { border-color: #00ff00; background: #0a2a0a; box-shadow: 0 0 20px rgba(0, 255, 0, 0.4); }
        .scene-preview { width: 100%; height: 100px; border-radius: 8px; margin-bottom: 10px; }
        .scene-name { font-size: 1rem; font-weight: bold; color: #ffd700; }
        .scene-desc { font-size: 0.75rem; color: #aaa; margin-top: 5px; }
        .btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: #ffd700;
            color: #1a1a2e;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            transition: all 0.2s;
            margin: 10px;
        }
        .btn:hover { background: #ffed4a; transform: scale(1.05); box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
        .btn:disabled { background: #555; color: #888; cursor: not-allowed; transform: none; }
        .btn-secondary { background: #4ecdc4; }
        .btn-secondary:hover { background: #6ee8df; }
        .health-bar-container { display: flex; justify-content: space-between; width: 600px; margin-bottom: 10px; }
        .health-bar { width: 200px; height: 25px; background: #333; border: 2px solid #555; position: relative; border-radius: 5px; overflow: hidden; }
        .health-bar-fill { height: 100%; transition: width 0.3s; }
        .health-bar-fill.p1 { background: linear-gradient(to bottom, #00ff00, #00aa00); }
        .health-bar-fill.p2 { background: linear-gradient(to bottom, #ff00ff, #aa00aa); }
        .health-text { position: absolute; width: 100%; text-align: center; line-height: 21px; font-weight: bold; text-shadow: 1px 1px 2px #000; font-size: 0.85rem; }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px 60px;
            border: 4px solid #ffd700;
            border-radius: 15px;
            text-align: center;
            display: none;
        }
        #gameOver h2 { color: #ffd700; font-size: 2.5rem; margin-bottom: 20px; }
        .controls { margin-top: 15px; display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; }
        .player-controls { background: #1a1a2e; padding: 12px 20px; border: 2px solid #333; border-radius: 8px; }
        .player-controls h3 { margin-bottom: 8px; }
        .player-controls.p1 h3 { color: #00ff00; }
        .player-controls.p2 h3 { color: #ff00ff; }
        .key { display: inline-block; background: #333; padding: 4px 8px; border-radius: 4px; margin: 2px; border: 1px solid #555; font-size: 0.85rem; }
        .turn-indicator { color: #ffd700; font-size: 1.2rem; margin-bottom: 10px; }
        .lang-selector { position: fixed; top: 10px; right: 10px; z-index: 100; }
        .lang-selector select {
            background: #1a1a2e; color: #ffd700; border: 2px solid #ffd700; padding: 6px 10px;
            border-radius: 6px; font-family: 'Courier New', monospace; font-size: 0.85rem; cursor: pointer;
        }
        .lang-selector select:focus { outline: none; box-shadow: 0 0 10px rgba(255,215,0,0.3); }
        [dir='rtl'] body { direction: rtl; }
        .btn-lang-toggle { background: #2a2a4e; color: #ffd700; border: 2px solid #ffd700; margin-bottom: 10px; }
        .btn-lang-toggle:hover { background: #3a3a6e; }
        .lang-panel { display: none; flex-wrap: wrap; justify-content: center; gap: 8px; max-width: 600px; margin-bottom: 20px; padding: 15px; background: #1a1a2e; border: 2px solid #ffd700; border-radius: 10px; }
        .lang-panel.open { display: flex; }
        .lang-btn {
            padding: 6px 14px; font-size: 0.85rem; background: #2a2a4e; color: #aaa;
            border: 2px solid #444; border-radius: 6px; cursor: pointer;
            font-family: 'Courier New', monospace; transition: all 0.2s;
        }
        .lang-btn:hover { border-color: #ffd700; color: #ffd700; transform: translateY(-2px); }
        .lang-btn.active { background: #ffd700; color: #1a1a2e; border-color: #ffd700; font-weight: bold; }
    </style>
</head>
<body>
    <div class="lang-selector">
        <select id="langSelect" onchange="switchLanguage(this.value)"></select>
    </div>
    <h1 data-i18n="title">⚔️ 像素机甲对战 ⚔️</h1>
    
    <!-- 主菜单 -->
    <div id="mainMenu" class="screen active">
        <div style="text-align: center; margin: 40px 0;">
            <p style="font-size: 1.2rem; color: #aaa; margin-bottom: 30px;" data-i18n="subtitle">选择你的机甲，征服战场！</p>
        </div>
        <button class="btn btn-lang-toggle" id="langToggleBtn" onclick="toggleLangPanel()">🌐 <span data-i18n="language">语言</span></button>
        <div id="langPanel" class="lang-panel">
            <div id="menuLangButtons" class="lang-buttons"></div>
        </div>
        <button class="btn" onclick="showCharacterSelection()" data-i18n="startGame">🎮 开始游戏</button>
        <button class="btn btn-secondary" onclick="showInstructions()" data-i18n="instructions">📖 游戏说明</button>
    </div>
    
    <!-- 角色选择界面 -->
    <div id="characterSelection" class="screen">
        <div class="selection-container">
            <h2 class="selection-title" data-i18n="selectMech">选择你的机甲战士</h2>
            <div class="selection-info">
                <div class="player-selection p1">
                    <h3>🟢 <span data-i18n="player">玩家</span> 1</h3>
                    <div class="selected-character-name" id="p1Selected" data-i18n="notSelected">未选择</div>
                </div>
                <div class="player-selection p2">
                    <h3>🟣 <span data-i18n="player">玩家</span> 2</h3>
                    <div class="selected-character-name" id="p2Selected" data-i18n="notSelected">未选择</div>
                </div>
            </div>
            <div class="turn-indicator" id="turnIndicator"></div>
            <div class="selection-grid" id="characterGrid"></div>
            <div style="text-align: center;">
                <button class="btn" id="toSceneBtn" onclick="showSceneSelection()" disabled data-i18n="nextScene">下一步：选择场景 →</button>
                <button class="btn btn-secondary" onclick="showMainMenu()" data-i18n="backToMenu">← 返回主菜单</button>
            </div>
        </div>
    </div>
    
    <!-- 场景选择界面 -->
    <div id="sceneSelection" class="screen">
        <div class="selection-container">
            <h2 class="selection-title" data-i18n="selectBattleScene">选择战斗场景</h2>
            <div class="scene-grid" id="sceneGrid"></div>
            <div style="text-align: center;">
                <button class="btn" id="startGameBtn" onclick="startGame()" disabled data-i18n="startBattle">⚔️ 开始战斗！</button>
                <button class="btn btn-secondary" onclick="showCharacterSelection()" data-i18n="backToChar">← 返回角色选择</button>
            </div>
        </div>
    </div>
    
    <!-- 游戏说明 -->
    <div id="instructions" class="screen">
        <div class="selection-container" style="text-align: left; max-width: 700px;">
            <h2 class="selection-title" data-i18n="instructionsTitle">📖 游戏说明</h2>
            <div style="background: #1a1a2e; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
                <h3 style="color: #ffd700; margin-bottom: 15px;" data-i18n="controlsTitle">🎮 操作方式</h3>
                <p style="margin-bottom: 10px;"><strong style="color: #00ff00;"><span data-i18n="player">玩家</span> 1：</strong><span data-i18n="p1Controls">WASD 移动，F 攻击，G 防御</span></p>
                <p><strong style="color: #ff00ff;"><span data-i18n="player">玩家</span> 2：</strong><span data-i18n="p2Controls">方向键 移动，. 攻击，/ 防御</span></p>
            </div>
            <div style="background: #1a1a2e; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
                <h3 style="color: #ffd700; margin-bottom: 15px;" data-i18n="battleRules">⚔️ 战斗规则</h3>
                <ul style="margin-left: 20px; line-height: 1.8;">
                    <li data-i18n="rule1">靠近对手后使用攻击键造成伤害</li>
                    <li data-i18n="rule2">防御可以减少 50% 受到的伤害</li>
                    <li data-i18n="rule3">每个角色有不同的属性和特色</li>
                    <li data-i18n="rule4">先将对方血量降为 0 的一方获胜</li>
                </ul>
            </div>
            <div style="text-align: center;">
                <button class="btn" onclick="showMainMenu()" data-i18n="backToMenu">← 返回主菜单</button>
            </div>
        </div>
    </div>
    
    <!-- 游戏界面 -->
    <div id="gameScreen" class="screen">
        <div class="health-bar-container">
            <div class="health-bar">
                <div class="health-bar-fill p1" id="health1" style="width: 100%"></div>
                <div class="health-text" id="p1Name"></div>
            </div>
            <div class="health-bar">
                <div class="health-bar-fill p2" id="health2" style="width: 100%"></div>
                <div class="health-text" id="p2Name"></div>
            </div>
        </div>
        <div id="gameContainer">
            <canvas id="gameCanvas" width="600" height="400"></canvas>
            <div id="gameOver">
                <h2 id="winnerText"></h2>
                <button class="btn" onclick="backToMenu()" style="margin-top: 20px;" data-i18n="homeBtn">🏠 返回主菜单</button>
                <button class="btn btn-secondary" onclick="rematch()" style="margin-top: 10px;" data-i18n="rematch">🔄 再来一局</button>
            </div>
        </div>
        <div class="controls">
            <div class="player-controls p1">
                <h3 id="p1ControlName"></h3>
                <div>
                    <span class="key">W</span> <span data-i18n="up">上</span><br>
                    <span class="key">A</span> <span data-i18n="left">左</span> <span class="key">S</span> <span data-i18n="down">下</span> <span class="key">D</span> <span data-i18n="right">右</span><br>
                    <span class="key">F</span> <span data-i18n="attack">攻击</span> <span class="key">G</span> <span data-i18n="defend">防御</span>
                </div>
            </div>
            <div class="player-controls p2">
                <h3 id="p2ControlName"></h3>
                <div>
                    <span class="key">↑</span> <span data-i18n="up">上</span><br>
                    <span class="key">←</span> <span data-i18n="left">左</span> <span class="key">↓</span> <span data-i18n="down">下</span> <span class="key">→</span> <span data-i18n="right">右</span><br>
                    <span class="key">.</span> <span data-i18n="attack">攻击</span> <span class="key">/</span> <span data-i18n="defend">防御</span>
                </div>
            </div>
        </div>
    </div>

    <script src="src/game.js"></script>
</body>
</html>
